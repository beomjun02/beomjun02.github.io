<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily News — archive</title>
<link rel="stylesheet" href="/stylesheet.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/earlyaccess/notosanskr.css">
<style>
.daily-news { max-width: 760px; margin: 2em auto; padding: 0 1.2em; }
.daily-news h1 { font-size: 1.6em; margin-bottom: 0.5em; }
.daily-news h2 { font-size: 1.15em; margin-top: 1.8em; border-bottom: 1px solid #ddd; padding-bottom: 0.3em; }
.daily-news h3 { font-size: 1em; margin-top: 1em; }
.daily-news ul { padding-left: 1.4em; }
.daily-news li { margin-bottom: 1em; line-height: 1.5; }
.daily-news .item-title { font-weight: 500; }
.daily-news .item-meta { color: #888; font-size: 0.85em; display: block; margin-top: 0.15em; }
.daily-news .item-desc { color: #555; font-size: 0.95em; display: block; margin-top: 0.25em; }
.daily-news .item-keywords { color: #d4a017; }
.daily-news .page-meta { color: #888; font-size: 0.85em; }
.daily-news .user-banner { text-align: center; margin: 0 0 1.6em 0; line-height: 1.55; }
.daily-news .user-handle { color: #222; font-weight: 600; font-size: 1.15em; margin-bottom: 0.5em; }
.daily-news .user-categories { color: #d4a017; font-size: 0.95em; font-weight: 600; margin-bottom: 0.5em; letter-spacing: 0.02em; }
.daily-news .user-kws { color: #d4a017; font-size: 0.88em; line-height: 1.45; }
.daily-news .archive { margin-top: 3em; border-top: 1px solid #ddd; padding-top: 1em; font-size: 0.9em; }
.daily-news .archive ul { list-style: none; padding-left: 0; }
.daily-news .archive li { margin-bottom: 0.3em; }
.daily-news .archive-more { margin-top: 0.5em; }
.daily-news .feedback { margin-top: 2.5em; border-top: 1px solid #ddd; padding-top: 1.2em; }
.daily-news .feedback-row { display: flex; align-items: center; gap: 0.6em; flex-wrap: wrap; }
.daily-news .fb-btn { font-size: 1.3em; background: none; border: 2px solid #ddd; border-radius: 6px; padding: 0.25em 0.55em; cursor: pointer; transition: border-color 0.15s, background 0.15s; line-height: 1; }
.daily-news .fb-btn:hover { border-color: #aaa; }
.daily-news .fb-btn.active { border-color: #d4a017; background: #fdf8e8; }
.daily-news .fb-text { flex: 1; min-width: 180px; border: 1px solid #ddd; border-radius: 4px; padding: 0.35em 0.6em; font-size: 0.9em; font-family: inherit; }
.daily-news .fb-submit { background: #333; color: #fff; border: none; border-radius: 4px; padding: 0.4em 1em; font-size: 0.9em; cursor: pointer; }
.daily-news .fb-submit:hover { background: #555; }
.daily-news .fb-submit:disabled { background: #aaa; cursor: default; }
.daily-news .fb-thanks { color: #888; font-size: 0.9em; }

.daily-news .theme-toggle { position: absolute; top: 0.6em; right: 0; background: none; border: none; font-size: 1.25em; cursor: pointer; padding: 0.2em 0.4em; line-height: 1; opacity: 0.6; transition: opacity 0.15s; }
.daily-news .theme-toggle:hover { opacity: 1; }
html[data-theme="light"] body { background: #fff !important; color: #333 !important; }
html[data-theme="light"] a { color: #2380e0; }
html[data-theme="light"] a:hover, html[data-theme="light"] a:focus { color: #f09228; }
html[data-theme="light"] .daily-news,
html[data-theme="light"] .daily-news h1,
html[data-theme="light"] .daily-news h2 { color: inherit; }
html[data-theme="light"] .daily-news h2 { border-bottom-color: #ddd; }
html[data-theme="light"] .daily-news .user-handle { color: #222; }
html[data-theme="light"] .daily-news .item-desc { color: #555; }
html[data-theme="light"] .daily-news .archive,
html[data-theme="light"] .daily-news .feedback { border-top-color: #ddd; }
html[data-theme="light"] .daily-news .fb-btn { border-color: #ddd; color: inherit; }
html[data-theme="light"] .daily-news .fb-btn.active { background: #fdf8e8; }
html[data-theme="light"] .daily-news .fb-text { background: #fff; color: inherit; border-color: #ddd; }
html[data-theme="light"] .daily-news .fb-submit { background: #333; }
html[data-theme="dark"] body { background: #000 !important; color: #e0e0e0 !important; }
html[data-theme="dark"] a { color: #64b5f6; }
html[data-theme="dark"] a:hover, html[data-theme="dark"] a:focus { color: #f09228; }
html[data-theme="dark"] .daily-news { color: #e0e0e0; }
html[data-theme="dark"] .daily-news h1 { color: #f0f0f0; }
html[data-theme="dark"] .daily-news h2 { color: #e0e0e0; border-bottom-color: #444; }
html[data-theme="dark"] .daily-news .user-handle { color: #f0f0f0; }
html[data-theme="dark"] .daily-news .item-desc { color: #aaa; }
html[data-theme="dark"] .daily-news .page-meta { color: #888; }
html[data-theme="dark"] .daily-news .archive { border-top-color: #444; }
html[data-theme="dark"] .daily-news .feedback { border-top-color: #444; }
html[data-theme="dark"] .daily-news .fb-btn { border-color: #555; color: #ccc; }
html[data-theme="dark"] .daily-news .fb-btn.active { border-color: #d4a017; background: #3a3520; }
html[data-theme="dark"] .daily-news .fb-text { background: #1a1a1a; color: #e0e0e0; border-color: #555; }
html[data-theme="dark"] .daily-news .fb-submit { background: #555; }
</style>
<script>(function(){var t;try{t=localStorage.getItem('dn-theme')}catch(e){}if(t!=='light'&&t!=='dark')t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div class="daily-news" style="position:relative;">
<button id="light-toggle" class="theme-toggle" aria-label="Toggle dark mode"></button>
<h1>Daily News — archive</h1>
<p class="page-meta">1 days · <a href="../">← latest</a></p>
<ul>
  <li><a href="../2026-05-27.html">2026-05-27</a>: <span class="archive-headline">Qwen3.7-Max agent foundation · NVIDIA Nemotron diffusion LMs · Anthropic Korea office</span></li>
</ul>
</div>
<script>
(function(){
  var btn=document.getElementById('light-toggle');if(!btn)return;
  function get(){var s;try{s=localStorage.getItem('dn-theme')}catch(e){}if(s==='light'||s==='dark')return s;return window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
  function apply(t){document.documentElement.setAttribute('data-theme',t);if(t==='dark'){document.body.classList.add('dark');btn.textContent='☀️';btn.title='Switch to light mode';}else{document.body.classList.remove('dark');btn.textContent='🌙';btn.title='Switch to dark mode';}try{localStorage.setItem('dn-theme',t)}catch(e){}}
  btn.addEventListener('click',function(){apply(get()==='dark'?'light':'dark');});
  apply(get());
})();
</script>
</body>
</html>
